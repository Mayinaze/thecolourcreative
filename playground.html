  <!-- ============================
       Main Content
       ============================ -->
  <main>

    <!-- ── Page Hero ── -->
    <section class="pg-hero">
      <div class="container container--flush">
        <h1 class="pg-hero__title">
          <span class="pg-hero__title-wrap">
            <img src="assets/highlight.png" alt="" class="pg-hero__highlight" aria-hidden="true" />
            Playground
          </span>
        </h1>
        <p class="pg-hero__subtitle">Just a designer, designing cool s**t</p>
      </div>
    </section>

    <!-- ── Card Grid — flush container ── -->
    <section>
      <div class="container container--flush">
        <div class="pg-grid">

          <!-- Row 1: Full-width, 600px tall -->
          <div class="pg-row pg-row--full">
            <div class="pg-card" style="height: 700px;">
              <img src="assets/hypergiant.png" alt="Hypergiant" loading="eager" />
            </div>
          </div>

          <!-- Row 2: Two asymmetric cards, 700px tall -->
          <div class="pg-row pg-row--two">
            <div class="pg-card" style="height: 700px; flex: 1.45 1 0;">
              <img src="assets/Tesla.png" alt="Tesla" loading="lazy" />
            </div>
            <div class="pg-card" style="height: 700px; flex: 1 1 0;">
              <img src="assets/plants.jpg" alt="Plantz" loading="lazy" />
            </div>
          </div>

          <!-- Row 3: Full-width — EightyNine -->
          <div class="pg-row pg-row--full">
            <div class="pg-card" style="height: 500px;">
              <img src="assets/eightnine.png" alt="The EightyNine" loading="lazy" />
            </div>
          </div>

          <!-- Row 4: Three equal cards — Mountain, Glasses, Plants -->
          <div class="pg-row pg-row--three">
            <div class="pg-card" style="height: 700px;">
              <img src="assets/mountain.jpg" alt="Mountain" loading="lazy" style="padding: 56px;" />
            </div>
            <div class="pg-card" style="height: 700px;">
              <img src="assets/glasses.png" alt="Glasses" loading="lazy" />
            </div>
            <div class="pg-card" style="height: 700px;">
              <img src="assets/plants.png" alt="Plants" loading="lazy" />
            </div>
          </div>

          <!-- Row 5: Full-width — Polestar -->
          <div class="pg-row pg-row--full">
            <div class="pg-card" style="height: 500px;">
              <img src="assets/polestar.png" alt="Polestar" loading="lazy" />
            </div>
          </div>

        </div><!-- /pg-grid -->
      </div>
    </section>

  </main>

       Footer
