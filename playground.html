  <meta charset="UTF-8" />

  <meta name="description" content="Just a designer, designing cool stuff." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!-- ============================
       Navigation
       ============================ -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <span class="nav__brand"><span>The</span> Colour Creative</span>
    <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav__list">
      <li class="nav__item">
        <a href="index.html" class="nav__link">Home</a>
      </li>
      <li class="nav__item">
        <div class="nav__divider" aria-hidden="true"></div>
        <a href="case-studies.html" class="nav__link">
          Case studies
        </a>
      </li>
      <li class="nav__item">
        <div class="nav__divider" aria-hidden="true"></div>
        <a href="playground.html" class="nav__link active">
          Playground

      </li>
      <li class="nav__item">
        <div class="nav__divider" aria-hidden="true"></div>
        <a href="ux-ui-improvements.html" class="nav__link">
          UX/UI improvements
        </a>
      </li>
    </ul>
  </nav>

  <!-- ============================
       Main Content
       ============================ -->
  <main>

    <!-- ── Page Hero ── -->
    <section class="pg-hero">
      <div class="container container--flush">
        <h1 class="pg-hero__title">
          <span class="pg-hero__title-wrap">
            <img src="assets/highlight.png" alt="" class="pg-hero__highlight" aria-hidden="true" />
            Playground
          </span>
        </h1>
        <p class="pg-hero__subtitle">Just a designer, designing cool s**t</p>
      </div>
    </section>

    <!-- ── Card Grid — flush container ── -->
    <section>
      <div class="container container--flush">
        <div class="pg-grid">

          <!-- Row 1: Full-width, 600px tall -->
          <div class="pg-row pg-row--full">
            <div class="pg-card" style="height: 700px;">
              <picture>
                <source srcset="assets/hypergiant.webp" type="image/webp" />
                <img src="assets/hypergiant.png" alt="Hypergiant brand design concept" loading="eager" />
              </picture>
            </div>
          </div>

          <!-- Row 2: Two asymmetric cards, 700px tall -->
          <div class="pg-row pg-row--two">
            <div class="pg-card" style="height: 700px; flex: 1.45 1 0;">
              <picture>
                <source srcset="assets/Tesla.webp" type="image/webp" />
                <img src="assets/Tesla.png" alt="Tesla UI redesign concept" loading="lazy" />
              </picture>
            </div>
            <div class="pg-card" style="height: 700px; flex: 1 1 0;">
              <picture>
                <img src="assets/plants.jpg" alt="Plantz app — plant care mobile app design concept" loading="lazy" />
              </picture>
            </div>
          </div>

          <!-- Row 3: Full-width — Figma Prototype -->
          <div class="pg-row pg-row--full">
            <div class="pg-card pg-card--figma">
              <div class="pg-figma-wrapper">
                <iframe style="border: none;" width="800" height="450" src="https://embed.figma.com/proto/KfYQageAzYySXPs3q0ZdBe/Polestar-animation?node-id=1-178&p=f&viewport=1440%2C404%2C0.22&scaling=scale-down&content-scaling=fixed&starting-point-node-id=1%3A178&page-id=0%3A1&embed-host=share&hide-ui=1&hotspot-hints=0" allowfullscreen title="Polestar interactive UI animation prototype"></iframe>
              </div>
            </div>
          </div>

          <!-- Row 4: Full-width — EightyNine -->
          <div class="pg-row pg-row--full">
            <div class="pg-card" style="height: 700px;">
              <picture>
                <source srcset="assets/eightnine.webp" type="image/webp" />
                <img src="assets/eightnine.png" alt="The EightyNine brand and visual identity design concept" loading="lazy" />
              </picture>
            </div>
          </div>

          <!-- Row 4: Three equal cards — Mountain, Glasses, Plants -->
          <div class="pg-row pg-row--three">
            <div class="pg-card" style="height: 400px;">
              <picture>
                <source srcset="assets/mountain.webp" type="image/webp" />
                <img src="assets/mountain.jpg" alt="Minimalist mountain landscape illustration" loading="lazy" style="padding: 56px;" />
              </picture>
            </div>
            <div class="pg-card" style="height: 400px;">
              <picture>
                <source srcset="assets/glasses.webp" type="image/webp" />
                <img src="assets/glasses.png" alt="Eyewear product design or glasses illustration" loading="lazy" />
              </picture>
            </div>
            <div class="pg-card" style="height: 400px;">
              <picture>
                <source srcset="assets/plants.webp" type="image/webp" />
                <img src="assets/plants.png" alt="Plant illustration or botanical design graphic" loading="lazy" />
              </picture>
            </div>
          </div>

          <!-- Row 5: Full-width — Polestar -->
          <div class="pg-row pg-row--full">
            <div class="pg-card" style="height: 700px;">
              <picture>
                <source srcset="assets/polestar.webp" type="image/webp" />
                <img src="assets/polestar.png" alt="Polestar EV brand UI concept design" loading="lazy" />
              </picture>
            </div>
          </div>

          <!-- Row 6: Two equal cards — Icons image + Figma Prototype -->
          <div class="pg-row pg-row--two">
            <div class="pg-card" style="flex: 1 1 0; height: 700px;">
              <picture>
                <img src="assets/icons.png" alt="Icon design collection" loading="lazy" />
              </picture>
            </div>
            <div class="pg-card pg-card--figma" style="flex: 1 1 0; height: 700px;">
              <div class="pg-figma-wrapper" style="height: 100%; aspect-ratio: unset;">
                <iframe style="border: 1px solid rgba(0, 0, 0, 0.1);" width="800" height="450" src="https://embed.figma.com/proto/XTqXYgXGNMIp9DqliacRjk/theColourCreative?node-id=120-1466&p=f&viewport=732%2C3%2C7.36&scaling=contain&content-scaling=fixed&starting-point-node-id=120%3A1456&page-id=120%3A1395&embed-host=share&hide-ui=1" allowfullscreen></iframe>
              </div>
            </div>
          </div>

          <!-- Row 7: Asymmetric cards — HiveHub logo (35%) + HiveHub nav UI (65%) -->
          <div class="pg-row pg-row--two">
            <div class="pg-card" style="flex: 35 1 0; height: 500px;">
              <img src="assets/logo-hive-hub.png" alt="HiveHub logo on yellow background" loading="lazy" style="object-fit: cover; padding: 0;" />
            </div>
            <div class="pg-card" style="flex: 65 1 0; height: 500px;">
              <img src="assets/hive-hub-nav.png" alt="HiveHub navigation UI components across light and dark backgrounds" loading="lazy" style="object-fit: cover; padding: 0;" />
            </div>
          </div>

          <!-- Row 8: Two equal cards — Boomin mobile + Error 404 -->
          <div class="pg-row pg-row--two">
            <div class="pg-card" style="flex: 1 1 0; height: 500px;">
              <img src="assets/boomin-mobile.png" alt="Boomin mobile app design" loading="lazy" />
            </div>
            <div class="pg-card" style="flex: 1 1 0; height: 500px;">
              <img src="assets/error-404.jpg" alt="404 error page design" loading="lazy" />
            </div>
          </div>

          <!-- Row 9: Full-width — Boomin applicants -->
          <div class="pg-row pg-row--full">
            <div class="pg-card" style="height: 700px;">
              <img src="assets/boomin-applicants.png" alt="Boomin applicants design" loading="lazy" />
            </div>
          </div>

          <!-- Row 10: Full-width — Luberfiend -->
          <div class="pg-row pg-row--full">
            <div class="pg-card" style="height: 700px;">
              <img src="assets/luberfiend.png" alt="Luberfiend design" loading="lazy" />
            </div>
          </div>

          <!-- Row 11: Full-width — Boomin Sneak Peek -->
          <div class="pg-row pg-row--full">
            <div class="pg-card" style="height: 700px;">
              <img src="assets/boomin-SneakPeek.png" alt="Boomin sneak peek design" loading="lazy" />
            </div>
          </div>

        </div><!-- /pg-grid -->
      </div>
    </section>

  </main>

  <!-- ============================
       Footer
       ============================ -->
  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <span class="footer__brand"><span class="brand-the">The</span> <span class="brand-colour">Colour</span> Creative</span>
        <p class="footer__copy">&copy; 2026 Jake. All rights reserved.</p>
        <div class="footer__links">
          <a href="index.html" class="footer__link">Home</a>
          <a href="case-studies.html" class="footer__link">Case studies</a>
          <a href="ux-ui-improvements.html" class="footer__link">UX/UI improvements</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
